version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "area-frontend"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Reduce PR noise: batch all minor/patch bumps into one PR.
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Majors are handled manually to avoid surprise breaking changes.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions used by workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
